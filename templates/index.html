<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实验室自动排机</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 48px 40px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 36px;
    }

    /* 拖拽上传区 */
    .drop-zone {
      border: 2px dashed #cbd5e0;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #4299e1;
      background: #ebf8ff;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .drop-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .drop-label {
      font-size: 15px;
      color: #4a5568;
    }
    .drop-hint {
      font-size: 13px;
      color: #a0aec0;
      margin-top: 6px;
    }
    .file-name {
      margin-top: 14px;
      font-size: 14px;
      color: #2b6cb0;
      font-weight: 500;
      min-height: 20px;
    }

    /* 按钮 */
    .btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: #3182ce;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover:not(:disabled) { background: #2b6cb0; }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; }

    /* 进度 / 状态区 */
    #status-box { margin-top: 24px; display: none; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #bee3f8;
      border-top-color: #3182ce;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      font-size: 15px;
      color: #2d3748;
      vertical-align: middle;
    }

    .warn-box {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fffbeb;
      border-left: 4px solid #f6ad55;
      border-radius: 6px;
      font-size: 13px;
      color: #744210;
      line-height: 1.6;
    }

    .error-box {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff5f5;
      border-left: 4px solid #fc8181;
      border-radius: 6px;
      font-size: 13px;
      color: #742a2a;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .download-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #38a169;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background .2s;
    }
    .download-btn:hover { background: #2f855a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>实验室自动排机</h1>
    <p class="subtitle">上传输入文件，系统自动完成杂交 pool 分配与上机 line 排布</p>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".xlsx,.xls">
      <div class="drop-icon">📄</div>
      <div class="drop-label">点击选择文件，或拖拽到此处</div>
      <div class="drop-hint">支持 .xlsx / .xls 格式</div>
      <div class="file-name" id="file-name"></div>
    </div>

    <button class="btn" id="run-btn" disabled>自动排机</button>

    <div id="status-box">
      <div id="loading-row" style="display:none">
        <span class="spinner"></span>
        <span class="status-text">正在排机，请稍候…</span>
      </div>
      <div class="warn-box" id="warn-box" style="display:none"></div>
      <div class="error-box" id="error-box" style="display:none"></div>
      <a class="download-btn" id="download-btn" style="display:none">下载排机结果</a>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone  = document.getElementById('drop-zone');
    const fileNameEl = document.getElementById('file-name');
    const runBtn    = document.getElementById('run-btn');
    const statusBox = document.getElementById('status-box');
    const loadingRow = document.getElementById('loading-row');
    const warnBox   = document.getElementById('warn-box');
    const errorBox  = document.getElementById('error-box');
    const downloadBtn = document.getElementById('download-btn');

    let selectedFile = null;

    function setFile(file) {
      if (!file) return;
      selectedFile = file;
      fileNameEl.textContent = '已选择：' + file.name;
      runBtn.disabled = false;
      resetStatus();
    }

    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      setFile(e.dataTransfer.files[0]);
    });

    function resetStatus() {
      warnBox.style.display = 'none';
      errorBox.style.display = 'none';
      downloadBtn.style.display = 'none';
      loadingRow.style.display = 'none';
      statusBox.style.display = 'none';
    }

    runBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      resetStatus();
      statusBox.style.display = 'block';
      loadingRow.style.display = 'block';
      runBtn.disabled = true;

      const fd = new FormData();
      fd.append('file', selectedFile);

      try {
        const resp = await fetch('/schedule', { method: 'POST', body: fd });
        const data = await resp.json();
        loadingRow.style.display = 'none';

        if (!resp.ok || data.error) {
          errorBox.textContent = data.error || '未知错误';
          errorBox.style.display = 'block';
        } else {
          if (data.warnings && data.warnings.length > 0) {
            warnBox.innerHTML = '<strong>提示：</strong><br>' + data.warnings.join('<br>');
            warnBox.style.display = 'block';
          }
          downloadBtn.href = '/download/' + data.job_id;
          downloadBtn.style.display = 'block';
        }
      } catch (err) {
        loadingRow.style.display = 'none';
        errorBox.textContent = '网络错误：' + err.message;
        errorBox.style.display = 'block';
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
